# Heroku container deploy manifest for the Next.js frontend.
# Activate with: `heroku stack:set container -a <app>`
#
# IMPORTANT: NEXT_PUBLIC_API_URL is baked into the JS bundle at build time, so
# it must be passed as a Docker build arg here. The bundle then hits that URL
# from the user's browser. Set it on the app once with:
#   heroku config:set NEXT_PUBLIC_API_URL=https://crops-api.herokuapp.com -a crops-web
# That config var is automatically forwarded to `docker build` because we
# reference it in `build.config` below.
#
# Deploy via git subtree from the repo root:
#   git subtree push --prefix frontend heroku-web main
build:
  docker:
    web: Dockerfile
  config:
    NEXT_PUBLIC_API_URL: $NEXT_PUBLIC_API_URL

run:
  web: node server.js
