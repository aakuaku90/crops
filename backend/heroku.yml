# Heroku container deploy manifest for the FastAPI backend.
# Activate with: `heroku stack:set container -a <app>`
#
# Deploy via git subtree from the repo root:
#   git subtree push --prefix backend heroku-api main
#
# `release` runs once per deploy; we use it to ensure the DB schema is up to
# date before the new web dynos accept traffic. init_db() also runs in the
# FastAPI lifespan, so this is belt-and-suspenders — but the release phase
# fails fast if the DB is unreachable, which is what we want.
build:
  docker:
    web: Dockerfile

run:
  web: uvicorn app.main:app --host 0.0.0.0 --port $PORT

release:
  # The release dyno exits after this command, so we don't need to close the
  # pool — the OS reaps the connections cleanly. Trying to close_pool() here
  # under a separate asyncio.run() blows up because asyncpg's SSL transports
  # were bound to the first loop, which gets closed before the second runs.
  command:
    - python -c "import asyncio; from app.db.database import init_db; asyncio.run(init_db())"
  image: web
